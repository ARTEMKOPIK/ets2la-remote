name: ets2la_remote
description: ETS2LA Remote — mobile autopilot control for Euro Truck Simulator 2
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  provider: ^6.1.2
  web_socket_channel: ^3.0.1
  http: ^1.2.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  shared_preferences: ^2.3.2
  fl_chart: ^0.68.0
  connectivity_plus: ^6.0.5
  animated_toggle_switch: ^0.8.4
  flutter_inappwebview: ^6.1.5
  path_provider: ^2.1.4
  shelf: ^1.4.1
  shelf_static: ^1.1.2

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
    - assets/unity_build/
