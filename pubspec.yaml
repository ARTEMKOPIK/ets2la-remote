name: ets2la_remote
description: ETS2LA Remote — mobile autopilot control for Euro Truck Simulator 2
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  provider: ^6.1.2
  web_socket_channel: ^2.4.0
  http: ^1.2.0
  shared_preferences: ^2.2.2
  fl_chart: ^0.66.0
  connectivity_plus: ^5.0.2
  path_provider: ^2.1.1
  shelf: ^1.4.0
  shelf_static: ^1.1.0
  package_info_plus: ^8.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_inappwebview: ^6.1.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
    - assets/unity_build/

