# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    # Auto-generated localizations — regenerated by `flutter gen-l10n` on
    # every `pub get`. Re-running the linter against them just produces noise.
    - lib/l10n/app_localizations*.dart
  errors:
    # Keep the signal-to-noise ratio up: these are "info" by default but
    # show up as walls of yellow in IDE linting. Downgrade or enable as
    # the codebase catches up with the stricter defaults.
    todo: ignore
    deprecated_member_use_from_same_package: warning

linter:
  rules:
    # Style rules we actively want on top of flutter_lints defaults.
    prefer_single_quotes: true
    prefer_const_declarations: true
    prefer_const_constructors_in_immutables: true
    sort_child_properties_last: true
    avoid_unnecessary_containers: true
    use_key_in_widget_constructors: true

    # Disabled — too much churn in existing code, and the concrete
    # improvements are marginal. Re-enable in a follow-up PR if desired.
    public_member_api_docs: false
    always_specify_types: false
