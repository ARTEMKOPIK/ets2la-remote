name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      manual_version:
        description: 'Manual version override (e.g., 1.0.1)'
        required: false
        type: string

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.event.inputs.manual_version }}"
          if [ -z "$VERSION" ]; then
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            LAST_VER=$(echo $LAST_TAG | sed 's/v//')
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_VER"
            PATCH=$((PATCH + 1))
            VERSION="$MAJOR.$MINOR.$PATCH"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION"

      - name: Update pubspec.yaml
        run: |
          sed -i "s/version: [0-9.]*/version: ${{ steps.version.outputs.VERSION }}/" pubspec.yaml
          cat pubspec.yaml | grep "^version:"

      - name: Flutter pub get
        run: |
          flutter config --no-analytics
          flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
