name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Skip if this push was created by the workflow itself (version bump commit)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version in pubspec.yaml
        id: version
        run: |
          git fetch --tags --force
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          SEMVER="${CURRENT%%+*}"
          BUILD_NUM="${CURRENT##*+}"
          if [ "$BUILD_NUM" = "$CURRENT" ]; then
            BUILD_NUM=0
          fi
          MAJOR="${SEMVER%%.*}"
          REST="${SEMVER#*.}"
          MINOR="${REST%%.*}"
          PATCH="${REST#*.}"
          NEW_PATCH=$((PATCH + 1))
          NEW_BUILD=$((BUILD_NUM + 1))
          # Skip over any semver tags that already exist (e.g. created manually)
          while git rev-parse --verify --quiet "refs/tags/v${MAJOR}.${MINOR}.${NEW_PATCH}" >/dev/null; do
            echo "Tag v${MAJOR}.${MINOR}.${NEW_PATCH} already exists, skipping"
            NEW_PATCH=$((NEW_PATCH + 1))
            NEW_BUILD=$((NEW_BUILD + 1))
          done
          NEW_SEMVER="${MAJOR}.${MINOR}.${NEW_PATCH}"
          NEW_VERSION="${NEW_SEMVER}+${NEW_BUILD}"
          sed -i "s/^version: .*/version: ${NEW_VERSION}/" pubspec.yaml
          echo "old=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "version=${NEW_SEMVER}" >> "$GITHUB_OUTPUT"
          echo "full=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_SEMVER}" >> "$GITHUB_OUTPUT"
          echo "Bumped ${CURRENT} -> ${NEW_VERSION}"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Restore release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is missing. Release APKs must be signed with a stable keystore so the app can auto-update." >&2
            echo "::error::Add ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD secrets at https://github.com/${{ github.repository }}/settings/secrets/actions" >&2
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.jks
          cat > android/key.properties <<EOF
          storeFile=app/release.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build universal APK (used by in-app auto-updater)
        run: flutter pub get && flutter build apk --release

      - name: Preserve universal APK before per-ABI build
        run: |
          mkdir -p dist/release
          cp build/app/outputs/flutter-apk/app-release.apk dist/release/app-release.apk

      - name: Build per-ABI split APKs (smaller downloads for manual installs)
        run: flutter build apk --release --split-per-abi

      - name: Collect per-ABI APKs
        run: |
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk dist/release/ 2>/dev/null || true
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk   dist/release/ 2>/dev/null || true
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk      dist/release/ 2>/dev/null || true
          ls -lh dist/release/

      - name: Verify APK signature
        run: |
          for APK in dist/release/*.apk; do
            SHA=$(keytool -printcert -jarfile "$APK" | grep -i 'SHA256:' | head -n1 | awk '{print $2}')
            SIZE=$(stat -c%s "$APK")
            printf '  %-48s %10s bytes  SHA-256=%s\n' "$(basename "$APK")" "$SIZE" "$SHA"
          done

      - name: Clean up keystore
        if: always()
        run: rm -f android/app/release.jks android/key.properties

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore(release): bump version to ${{ steps.version.outputs.full }} [skip ci]"
          git push origin HEAD:main

      - name: Create tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          files: |
            dist/release/app-release.apk
            dist/release/app-arm64-v8a-release.apk
            dist/release/app-armeabi-v7a-release.apk
            dist/release/app-x86_64-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
