plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// Load signing config from android/key.properties when present.
// CI writes this file from GitHub Secrets; locally it's gitignored.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
def hasReleaseSigning = keystoreProperties.containsKey("storeFile")

// Allow release builds without a keystore only when the developer has
// explicitly opted in (e.g. local debugging via `flutter run --release`).
// In CI we want a hard failure if the keystore wasn't provisioned, so we
// never ship an APK signed with the debug key from a misconfigured pipeline.
def allowDebugSignedRelease =
        project.hasProperty("allowDebugSignedRelease") ||
        System.getenv("ALLOW_DEBUG_SIGNED_RELEASE") == "1"

android {
    namespace = "com.ets2la.ets2la_remote"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.ets2la.ets2la_remote"
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        if (hasReleaseSigning) {
            release {
                storeFile = rootProject.file(keystoreProperties["storeFile"])
                storePassword = keystoreProperties["storePassword"]
                keyAlias = keystoreProperties["keyAlias"]
                keyPassword = keystoreProperties["keyPassword"]
            }
        }
    }

    buildTypes {
        release {
            if (hasReleaseSigning) {
                signingConfig = signingConfigs.release
            } else if (allowDebugSignedRelease) {
                // Local `flutter run --release` convenience — opt-in only.
                signingConfig = signingConfigs.debug
            } else {
                // Leave signingConfig unset; the build will fail fast with
                // a clear error rather than silently shipping a debug-signed
                // APK to users from a misconfigured CI pipeline.
                logger.warn(
                    "No release keystore configured. Set android/key.properties " +
                    "or pass -PallowDebugSignedRelease=true to use the debug key locally.")
            }
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Wearable Data Layer — receives MessageClient pings from the Wear OS
    // companion in :wear. The phone's WearMessageListenerService forwards
    // them into Flutter via MainActivity intents.
    implementation "com.google.android.gms:play-services-wearable:18.2.0"
}
