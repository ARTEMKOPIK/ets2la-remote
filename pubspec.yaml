name: ets2la_remote
description: ETS2LA Remote — mobile autopilot control for Euro Truck Simulator 2
publish_to: 'none'
version: 1.0.24+25

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  provider: ^6.1.2
  web_socket_channel: ^2.4.0
  http: ^1.2.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  package_info_plus: ^8.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_inappwebview: ^6.1.0
  open_filex: ^4.5.0
  url_launcher: ^6.2.5
  multicast_dns: ^0.3.2
  shelf: ^1.4.1
  shelf_static: ^1.1.3
  # UX round 3 additions
  qr_flutter: ^4.1.0          # render QR for profile sharing
  mobile_scanner: ^5.0.0      # scan QR to import profile
  # Pinned to 4.0.2 exact: newer 4.2.x versions are compiled against
  # Kotlin 2.2 and require compileSdk 36, which breaks the release APK
  # build (the project uses Kotlin 1.9 / compileSdk from Flutter 3.24.0).
  # See: https://github.com/dlutton/flutter_tts/releases
  flutter_tts: 4.0.2          # voice cues for autopilot / ACC events
  wakelock_plus: ^1.2.5       # keep screen on in driver mode

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
    - assets/unity_build/
